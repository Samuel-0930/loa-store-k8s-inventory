apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_DB
              value: roastore
            - name: POSTGRES_USER
              value: admin
            - name: POSTGRES_PASSWORD
              value: roastore123
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-init-volume
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: init.sql
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-init-volume
          configMap:
            name: postgres-init-sql
        - name: postgres-storage
          emptyDir: {}
