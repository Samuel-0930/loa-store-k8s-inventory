apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-worker
  labels:
    app: inventory-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-worker
  template:
    metadata:
      labels:
        app: inventory-worker
    spec:
      containers:
      - name: inventory-worker
        image: loa-store/inventory-worker:latest
        imagePullPolicy: Never
        env:
        - name: REDIS_HOST
          value: "redis-service"
